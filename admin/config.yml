backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "assets/images"
public_folder: "/assets/images"

collections:

  - name: "events"
    label: "Upcoming Events"
    files:
      - file: "content/events.json"
        name: "events"
        label: "Events List"
        fields:
          - label: "Events"
            name: "events"
            widget: "list"
            max: 3
            fields:
              - { label: "ID",         name: "id",        widget: "string" }
              - { label: "Title",      name: "title",      widget: "string" }
              - { label: "Date",       name: "date",       widget: "string",  hint: "e.g. 31 May 2026" }
              - { label: "Location",   name: "location",   widget: "string" }
              - { label: "Poster",     name: "poster",     widget: "image",   required: false, hint: "Leave blank to use logo placeholder" }
              - { label: "Details",    name: "details",    widget: "text" }
              - { label: "Ticket URL", name: "ticketUrl",  widget: "string",  required: false }

  - name: "about"
    label: "About Page"
    files:
      - file: "content/about.json"
        name: "about"
        label: "About Text"
        fields:
          - { label: "Body", name: "body", widget: "markdown" }

  - name: "previous-events"
    label: "Previous Events"
    files:
      - file: "content/previous-events.json"
        name: "previous-events"
        label: "Previous Events Gallery"
        fields:
          - label: "Events"
            name: "events"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date",  name: "date",  widget: "string", required: false, hint: "e.g. June 2023" }
              - { label: "Image", name: "image", widget: "image" }
